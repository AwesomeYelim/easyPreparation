name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: easyPreparation_darwin_arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact: easyPreparation_darwin_amd64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: easyPreparation_linux_amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: easyPreparation_windows_amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        run: cd ui && npm ci && npm run build

      - name: Copy frontend (Unix)
        if: runner.os != 'Windows'
        run: rm -rf cmd/server/frontend && cp -r ui/out cmd/server/frontend

      - name: Copy frontend (Windows)
        if: runner.os == 'Windows'
        run: |
          if (Test-Path cmd/server/frontend) { Remove-Item -Recurse -Force cmd/server/frontend }
          Copy-Item -Recurse ui/out cmd/server/frontend

      - name: Get version
        id: ver
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build server (Unix)
        if: runner.os != 'Windows'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build \
            -ldflags="-X main.Version=${{ steps.ver.outputs.VERSION }} -X main.Commit=${{ github.sha }} -X main.BuildTime=${BUILD_TIME}" \
            -o ${{ matrix.artifact }} \
            ./cmd/server/

      - name: Build server (Windows)
        if: runner.os == 'Windows'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        shell: pwsh
        run: |
          $BUILD_TIME = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
          go build `
            -ldflags="-X main.Version=${{ steps.ver.outputs.VERSION }} -X main.Commit=${{ github.sha }} -X main.BuildTime=$BUILD_TIME" `
            -o ${{ matrix.artifact }} `
            ./cmd/server/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            easyPreparation_darwin_arm64/*
            easyPreparation_darwin_amd64/*
            easyPreparation_linux_amd64/*
            easyPreparation_windows_amd64.exe/*
