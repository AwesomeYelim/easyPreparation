name: Landing Page Build

on:
  push:
    branches: [master]
    paths:
      - 'landing/**'
  pull_request:
    paths:
      - 'landing/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - run: npm ci
        working-directory: landing

      - run: npm run build
        working-directory: landing

      - uses: actions/upload-artifact@v4
        with:
          name: landing-out
          path: landing/out/
