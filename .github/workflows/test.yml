name: Test

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: go vet
        run: go vet -tags dev ./cmd/server/

      - name: go build check
        run: go build -tags dev -o /dev/null ./cmd/server/
